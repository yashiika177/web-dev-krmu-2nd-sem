<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Async Weather Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌤 Async Weather Tracker</h1>

    <div class="cards">
      <!-- Search Section -->
      <div class="card">
        <h3>Search City</h3>
        <div class="input-group">
          <input id="cityInput" placeholder="Delhi, London">
          <button id="searchBtn">Search</button>
        </div>

        <h3>Search History</h3>
        <div class="history" id="history"></div>
        <button onclick="clearHistory()" class="clear-btn">Clear History</button>
      </div>

      <!-- Weather Info -->
      <div class="card">
        <h3>Weather Info</h3>
        <div id="weather"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
